<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
<meta name="theme-color" content="#2F7A55">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Medicine">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<title>Le mie medicine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EFF4F1;
    --paper-2:#F8FBF9;
    --surface:#FFFFFF;
    --ink:#151F1C;
    --muted:#647169;
    --border:#E3E9E4;
    --mattina:#E2A03D;
    --pranzo:#D96A44;
    --pomeriggio:#3E86A0;
    --sera:#3D3F72;
    --success:#2F7A55;
    --success-bg:#E5F1E9;
    --danger:#B5473A;
    --danger-bg:#F8EAE7;
    --shadow-sm:0 1px 2px rgba(21,31,28,0.05), 0 1px 1px rgba(21,31,28,0.04);
    --shadow-md:0 8px 20px -6px rgba(21,31,28,0.12), 0 2px 6px rgba(21,31,28,0.05);
    --shadow-lg:0 16px 36px -10px rgba(21,31,28,0.18);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(720px 420px at 15% -8%, #E4EEE7 0%, transparent 60%),
      radial-gradient(600px 500px at 110% 10%, #E8F0EC 0%, transparent 55%),
      var(--paper);
    color:var(--ink);
    font-family:'Atkinson Hyperlegible Next', 'Atkinson Hyperlegible', system-ui, sans-serif;
    font-size:20px;
    line-height:1.45;
    -webkit-tap-highlight-color:transparent;
    padding-bottom:112px;
    min-height:100vh;
    font-variant-numeric:tabular-nums;
  }
  button{font-family:inherit;}
  :focus-visible{outline:3px solid var(--pomeriggio);outline-offset:2px;border-radius:8px;}
  .app{max-width:520px;margin:0 auto;padding:22px 18px 0;}
  .screen{display:none;}
  .screen.active{display:block;animation:screenIn 0.35s ease both;}
  @keyframes screenIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }
  @keyframes riseIn{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;} }
  @keyframes popCheck{ 0%{transform:scale(0.3); opacity:0;} 60%{transform:scale(1.18); opacity:1;} 100%{transform:scale(1);} }
  @media (prefers-reduced-motion: reduce){
    .screen.active{animation:none;}
    *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
  }

  /* ---- Icon system ---- */
  .icon{width:22px;height:22px;display:block;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
  .icon-sm{width:18px;height:18px;}
  .icon-lg{width:28px;height:28px;stroke-width:2.4;}

  /* ---- Brand / top bar ---- */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .brand{display:flex;align-items:center;gap:11px;}
  .brand-mark{
    width:42px;height:42px;border-radius:13px;flex-shrink:0;
    background:linear-gradient(135deg, var(--success), #24573C);
    display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:var(--shadow-sm);
  }
  .brand-name{font-size:14px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}
  .icon-btn{
    background:var(--surface);border:none;border-radius:15px;box-shadow:var(--shadow-sm);
    width:50px;height:50px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;color:var(--ink);transition:transform 0.15s ease;
  }
  .icon-btn:active{transform:scale(0.92);}
  .back-btn{
    background:var(--surface);border:none;border-radius:14px;box-shadow:var(--shadow-sm);
    padding:12px 20px 12px 16px;font-size:18px;font-weight:700;color:var(--ink);
    display:inline-flex;align-items:center;gap:7px;cursor:pointer;margin-bottom:16px;
    transition:transform 0.15s ease;
  }
  .back-btn:active{transform:scale(0.96);}

  /* ---- Day arc (signature element / hero) ---- */
  .arc-wrap{
    background:linear-gradient(180deg, var(--surface), var(--paper-2));
    border-radius:26px;padding:22px 22px 18px;margin-bottom:20px;
    box-shadow:var(--shadow-md);position:relative;overflow:hidden;
  }
  .arc-date{font-size:26px;font-weight:800;letter-spacing:-0.01em;margin-bottom:2px;}
  .arc-sub{color:var(--muted);font-size:17px;margin-bottom:18px;font-weight:500;}
  .arc-bar{
    position:relative;height:12px;border-radius:8px;
    background:linear-gradient(90deg, var(--mattina) 0%, var(--pranzo) 33%, var(--pomeriggio) 66%, var(--sera) 100%);
    margin:14px 6px 8px;
  }
  .arc-sun{
    position:absolute;top:50%;width:24px;height:24px;border-radius:50%;
    background:var(--surface);border:4px solid var(--ink);
    box-shadow:0 0 0 6px rgba(21,31,28,0.06), var(--shadow-sm);
    transform:translate(-50%,-50%);transition:left 0.6s cubic-bezier(.4,0,.2,1);
  }
  .arc-labels{display:flex;justify-content:space-between;font-size:13px;font-weight:700;color:var(--muted);padding:0 4px;letter-spacing:0.02em;}

  /* ---- Progress ---- */
  .progress-row{display:flex;align-items:center;gap:14px;margin-bottom:22px;}
  .progress-track{flex:1;height:14px;background:var(--border);border-radius:8px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg, var(--success), #4A9C74);border-radius:8px;transition:width 0.5s cubic-bezier(.4,0,.2,1);}
  .progress-label{font-weight:800;white-space:nowrap;font-size:18px;}

  /* ---- Period section ---- */
  .period-title{
    font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;
    margin:24px 0 12px 4px;display:flex;align-items:center;gap:9px;color:var(--muted);
  }
  .period-dot{width:11px;height:11px;border-radius:50%;}

  /* ---- Medicine card ---- */
  .med-card{
    background:var(--surface);border-radius:20px;
    padding:17px 17px;margin-bottom:12px;display:flex;align-items:center;gap:14px;
    box-shadow:var(--shadow-sm);border-left:6px solid var(--border);
    animation:riseIn 0.35s ease both;transition:box-shadow 0.2s ease, background 0.2s ease;
  }
  .med-info{flex:1;min-width:0;}
  .med-name{font-size:21px;font-weight:700;margin:0 0 3px;letter-spacing:-0.005em;}
  .med-meta{color:var(--muted);font-size:16px;margin:0;font-weight:500;}
  .med-taken-time{color:var(--success);font-size:15px;font-weight:700;margin-top:5px;display:flex;align-items:center;gap:5px;}
  .check-btn{
    flex-shrink:0;width:60px;height:60px;border-radius:18px;border:none;
    background:var(--paper);cursor:pointer;color:transparent;
    display:flex;align-items:center;justify-content:center;transition:all 0.18s cubic-bezier(.4,0,.2,1);
    box-shadow:inset 0 0 0 2px var(--border);
  }
  .check-btn:active{transform:scale(0.9);}
  .med-card.done{background:var(--success-bg);box-shadow:var(--shadow-sm);}
  .med-card.done .check-btn{background:var(--success);color:#fff;box-shadow:var(--shadow-sm);}
  .check-btn.just-toggled .icon{animation:popCheck 0.4s cubic-bezier(.34,1.56,.64,1);}

  .empty-box{
    background:var(--surface);border-radius:22px;box-shadow:var(--shadow-sm);
    padding:38px 22px;text-align:center;color:var(--muted);font-size:19px;font-weight:500;
  }
  .empty-box .empty-icon{width:44px;height:44px;margin:0 auto 12px;color:var(--success);stroke-width:1.5;}

  /* ---- Bottom nav (floating) ---- */
  .bottom-nav{
    position:fixed;bottom:16px;left:16px;right:16px;background:rgba(255,255,255,0.88);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-radius:22px;box-shadow:var(--shadow-lg);display:flex;padding:8px;
    gap:6px;max-width:488px;margin:0 auto;
  }
  .nav-btn{
    flex:1;border:none;background:transparent;border-radius:16px;padding:11px 4px;
    display:flex;flex-direction:column;align-items:center;gap:4px;font-size:13px;font-weight:700;
    color:var(--muted);cursor:pointer;transition:background 0.2s ease, color 0.2s ease;
  }
  .nav-btn.active{color:var(--success);background:var(--success-bg);}

  /* ---- History ---- */
  .day-row{
    background:var(--surface);border-radius:18px;padding:16px 17px;margin-bottom:10px;
    box-shadow:var(--shadow-sm);cursor:pointer;animation:riseIn 0.35s ease both;
  }
  .day-row-top{display:flex;align-items:center;gap:12px;}
  .status-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;}
  .day-row-date{font-weight:700;font-size:18px;flex:1;}
  .day-row-summary{color:var(--muted);font-size:15px;font-weight:500;}
  .day-detail{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
  .day-detail.open{display:block;}
  .day-detail-item{display:flex;justify-content:space-between;font-size:16px;padding:6px 0;}
  .status-green{background:var(--success);}
  .status-amber{background:var(--mattina);}
  .status-red{background:var(--danger);}

  /* ---- Manage screen / forms ---- */
  .field{margin-bottom:18px;}
  .field label{display:block;font-weight:700;margin-bottom:7px;font-size:17px;}
  .field input, .field select{
    width:100%;padding:14px 16px;font-size:19px;border-radius:14px;border:2px solid var(--border);
    font-family:inherit;background:var(--surface);color:var(--ink);transition:border-color 0.15s ease;
  }
  .field input:focus, .field select:focus{outline:none;border-color:var(--pomeriggio);}
  .primary-btn{
    width:100%;padding:18px;font-size:21px;font-weight:800;border:none;border-radius:16px;
    background:linear-gradient(180deg, var(--success), #276B4B);color:#fff;cursor:pointer;margin-top:8px;
    box-shadow:var(--shadow-sm);transition:transform 0.15s ease;
  }
  .primary-btn:active{transform:scale(0.98);}
  .manage-item{
    background:var(--surface);border-radius:18px;box-shadow:var(--shadow-sm);
    padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:10px;
    animation:riseIn 0.3s ease both;
  }
  .manage-item-info{flex:1;min-width:0;}
  .manage-item-name{font-weight:700;font-size:19px;}
  .manage-item-meta{color:var(--muted);font-size:15px;font-weight:500;}
  .small-btn{
    border:none;background:var(--paper);border-radius:12px;flex-shrink:0;
    width:44px;height:44px;cursor:pointer;color:var(--ink);transition:transform 0.15s ease;
    display:flex;align-items:center;justify-content:center;
  }
  .small-btn:active{transform:scale(0.9);}
  .small-btn.danger{color:var(--danger);background:var(--danger-bg);}
  .section-gap{margin-top:28px;}
  h2{font-size:23px;margin:0 0 14px;letter-spacing:-0.01em;font-weight:800;}
  .hint{color:var(--muted);font-size:16px;margin-top:-10px;margin-bottom:18px;font-weight:500;}

  /* ---- Day-of-week selector (form) ---- */
  .quick-days-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  .quick-day-btn{
    padding:10px 15px;border:2px solid var(--border);border-radius:12px;background:var(--surface);
    font-size:14px;font-weight:700;cursor:pointer;color:var(--ink);transition:all 0.15s ease;
  }
  .quick-day-btn.active{background:var(--success-bg);border-color:var(--success);color:var(--success);}
  .day-toggle-row{display:flex;gap:6px;margin-bottom:18px;}
  .day-toggle{
    flex:1;padding:12px 0;text-align:center;border:2px solid var(--border);border-radius:12px;
    font-weight:700;font-size:15px;cursor:pointer;background:var(--surface);color:var(--muted);
    transition:all 0.15s ease;
  }
  .day-toggle.active{background:var(--pomeriggio);border-color:var(--pomeriggio);color:#fff;}

  /* ---- Settimana ---- */
  .week-day-block{background:var(--surface);border-radius:20px;padding:15px 17px;margin-bottom:12px;box-shadow:var(--shadow-sm);animation:riseIn 0.3s ease both;}
  .week-day-block.is-today{box-shadow:var(--shadow-md);background:var(--success-bg);}
  .week-day-header{display:flex;align-items:center;gap:9px;font-weight:800;font-size:18px;margin-bottom:9px;}
  .today-badge{background:var(--success);color:#fff;font-size:11px;padding:4px 9px;border-radius:9px;font-weight:800;letter-spacing:0.03em;}
  .week-med-row{display:flex;justify-content:space-between;font-size:16px;padding:5px 2px;}
  .week-med-row .wm-time{color:var(--muted);font-weight:700;white-space:nowrap;margin-left:10px;}
  .week-empty{color:var(--muted);font-size:15px;font-style:italic;}

  /* ---- Promemoria ---- */
  .reminder-banner{
    display:flex;align-items:center;gap:12px;background:var(--surface);border-radius:18px;
    padding:14px 16px;margin-bottom:18px;box-shadow:var(--shadow-sm);
  }
  .reminder-icon{
    width:42px;height:42px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    background:var(--paper);color:var(--muted);
  }
  .reminder-banner.on .reminder-icon{background:var(--success-bg);color:var(--success);}
  .reminder-text{flex:1;min-width:0;}
  .reminder-title{font-weight:700;font-size:16px;margin:0 0 2px;}
  .reminder-sub{color:var(--muted);font-size:14px;margin:0;font-weight:500;}
  .reminder-btn{
    flex-shrink:0;border:none;border-radius:12px;padding:11px 16px;font-size:15px;font-weight:700;
    cursor:pointer;background:var(--success);color:#fff;transition:transform 0.15s ease;
  }
  .reminder-btn:active{transform:scale(0.95);}
  .reminder-btn.off{background:var(--paper);color:var(--muted);}
</style>
</head>
<body>

<!-- ===================== SPRITE ICONE (nascosto) ===================== -->
<svg width="0" height="0" style="position:absolute;overflow:hidden">
  <defs>
    <symbol id="icon-pill" viewBox="0 0 24 24">
      <rect x="3" y="8.5" width="18" height="7" rx="3.5"/>
      <line x1="12" y1="8.5" x2="12" y2="15.5"/>
    </symbol>
    <symbol id="icon-sliders" viewBox="0 0 24 24">
      <line x1="4" y1="6" x2="20" y2="6"/>
      <circle cx="9" cy="6" r="2" fill="var(--surface)"/>
      <line x1="4" y1="12" x2="20" y2="12"/>
      <circle cx="15" cy="12" r="2" fill="var(--surface)"/>
      <line x1="4" y1="18" x2="20" y2="18"/>
      <circle cx="7" cy="18" r="2" fill="var(--surface)"/>
    </symbol>
    <symbol id="icon-checklist" viewBox="0 0 24 24">
      <rect x="4.5" y="4" width="15" height="17" rx="2.5"/>
      <path d="M8.5 4V3a1 1 0 0 1 1-1h5a1 1 0 0 1 1 1v1"/>
      <path d="M8 11.5l1.8 1.8L13.5 9.5"/>
      <line x1="8" y1="16" x2="16" y2="16"/>
    </symbol>
    <symbol id="icon-calendar" viewBox="0 0 24 24">
      <rect x="3.5" y="5" width="17" height="15.5" rx="2.5"/>
      <line x1="3.5" y1="9.5" x2="20.5" y2="9.5"/>
      <line x1="8" y1="3" x2="8" y2="6.5"/>
      <line x1="16" y1="3" x2="16" y2="6.5"/>
      <circle cx="8" cy="14" r="1" fill="currentColor" stroke="none"/>
      <circle cx="12" cy="14" r="1" fill="currentColor" stroke="none"/>
      <circle cx="16" cy="14" r="1" fill="currentColor" stroke="none"/>
      <circle cx="8" cy="17.3" r="1" fill="currentColor" stroke="none"/>
      <circle cx="12" cy="17.3" r="1" fill="currentColor" stroke="none"/>
    </symbol>
    <symbol id="icon-history" viewBox="0 0 24 24">
      <path d="M3.5 12a8.5 8.5 0 1 0 2.8-6.3"/>
      <path d="M3 3.5v4.5h4.5"/>
      <path d="M12 8v4.5l3 2.2"/>
    </symbol>
    <symbol id="icon-pencil" viewBox="0 0 24 24">
      <path d="M4 20h4l10.5-10.5a2.1 2.1 0 0 0-3-3L5 17v3z"/>
      <path d="M13.5 8l2.5 2.5"/>
    </symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24">
      <path d="M4.5 7h15"/>
      <path d="M9.5 7V4.5a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1V7"/>
      <path d="M6.5 7l1 12a2 2 0 0 0 2 1.9h5a2 2 0 0 0 2-1.9l1-12"/>
      <line x1="10" y1="11" x2="10" y2="17"/>
      <line x1="14" y1="11" x2="14" y2="17"/>
    </symbol>
    <symbol id="icon-check" viewBox="0 0 24 24">
      <path d="M5 13l4.5 4.5L19 7"/>
    </symbol>
    <symbol id="icon-chevron-left" viewBox="0 0 24 24">
      <path d="M15 19l-7-7 7-7"/>
    </symbol>
    <symbol id="icon-clock-small" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="8.5"/>
      <path d="M12 7.5V12l3 2"/>
    </symbol>
    <symbol id="icon-bell" viewBox="0 0 24 24">
      <path d="M6 10a6 6 0 0 1 12 0c0 4 1.5 5.5 2 6H4c0.5-0.5 2-2 2-6z"/>
      <path d="M9.5 19a2.5 2.5 0 0 0 5 0"/>
    </symbol>
  </defs>
</svg>

<div class="app">

  <!-- ===================== SCHERMATA OGGI ===================== -->
  <div id="screen-today" class="screen active">
    <div class="topbar">
      <div class="brand">
        <span class="brand-mark"><svg class="icon icon-sm"><use href="#icon-pill"></use></svg></span>
        <span class="brand-name">Le mie medicine</span>
      </div>
      <button class="icon-btn" onclick="goTo('manage')" aria-label="Gestisci medicine">
        <svg class="icon"><use href="#icon-sliders"></use></svg>
      </button>
    </div>

    <div class="arc-wrap">
      <div class="arc-date" id="today-date">-</div>
      <div class="arc-sub" id="today-sub">-</div>
      <div class="arc-bar"><div class="arc-sun" id="arc-sun"></div></div>
      <div class="arc-labels"><span>Mattina</span><span>Pranzo</span><span>Pomeriggio</span><span>Sera</span></div>
    </div>

    <div class="reminder-banner" id="reminder-banner">
      <span class="reminder-icon"><svg class="icon icon-sm"><use href="#icon-bell"></use></svg></span>
      <div class="reminder-text">
        <p class="reminder-title" id="reminder-title">Promemoria</p>
        <p class="reminder-sub" id="reminder-sub">Verifica in corso…</p>
      </div>
      <button class="reminder-btn off" id="reminder-btn" onclick="handleReminderButton()">Attiva</button>
    </div>

    <div class="progress-row" id="progress-row" style="display:none;">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label">0 di 0</div>
    </div>

    <div id="today-list"></div>
  </div>

  <!-- ===================== SCHERMATA SETTIMANA ===================== -->
  <div id="screen-week" class="screen">
    <button class="back-btn" onclick="goTo('today')"><svg class="icon icon-sm"><use href="#icon-chevron-left"></use></svg>Oggi</button>
    <h2>La settimana tipo</h2>
    <p class="hint">Si ripete uguale ogni settimana, salvo le medicine impostate solo per certi giorni.</p>
    <div id="week-list"></div>
  </div>

  <!-- ===================== SCHERMATA STORICO ===================== -->
  <div id="screen-history" class="screen">
    <button class="back-btn" onclick="goTo('today')"><svg class="icon icon-sm"><use href="#icon-chevron-left"></use></svg>Oggi</button>
    <h2>Storico dei giorni passati</h2>
    <div id="history-list"></div>
  </div>

  <!-- ===================== SCHERMATA GESTIONE ===================== -->
  <div id="screen-manage" class="screen">
    <button class="back-btn" onclick="goTo('today')"><svg class="icon icon-sm"><use href="#icon-chevron-left"></use></svg>Oggi</button>
    <h2>Gestisci le medicine</h2>
    <div id="manage-list"></div>

    <div class="section-gap">
      <h2 id="form-title">Aggiungi una medicina</h2>
      <div class="field">
        <label for="f-name">Nome della medicina</label>
        <input type="text" id="f-name" placeholder="Es. Cardioaspirina">
      </div>
      <div class="field">
        <label for="f-dose">Dosaggio</label>
        <input type="text" id="f-dose" placeholder="Es. 1 compressa">
      </div>
      <div class="field">
        <label for="f-time">Orario</label>
        <input type="time" id="f-time" value="08:00">
      </div>
      <div class="field">
        <label for="f-notes">Note (facoltativo)</label>
        <input type="text" id="f-notes" placeholder="Es. dopo colazione">
      </div>
      <div class="field">
        <label>In quali giorni?</label>
        <div class="quick-days-row">
          <button type="button" class="quick-day-btn" onclick="setQuickDays('all')">Tutti i giorni</button>
          <button type="button" class="quick-day-btn" onclick="setQuickDays('weekdays')">Lun-Ven</button>
          <button type="button" class="quick-day-btn" onclick="setQuickDays('weekend')">Sab-Dom</button>
        </div>
        <div class="day-toggle-row" id="day-toggle-row"></div>
      </div>
      <button class="primary-btn" id="save-btn" onclick="saveMedFromForm()">Salva medicina</button>
    </div>
  </div>

  <div style="height:20px;"></div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" id="nav-today" onclick="goTo('today')">
    <svg class="icon"><use href="#icon-checklist"></use></svg>Oggi
  </button>
  <button class="nav-btn" id="nav-week" onclick="goTo('week')">
    <svg class="icon"><use href="#icon-calendar"></use></svg>Settimana
  </button>
  <button class="nav-btn" id="nav-history" onclick="goTo('history')">
    <svg class="icon"><use href="#icon-history"></use></svg>Storico
  </button>
</div>

<script>
let medicines = [];
let history = {};
let editingId = null;
let lastToggledId = null;

const GIORNI = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
const MESI = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

function pad(n){return n.toString().padStart(2,'0');}
function todayKey(){
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function keyToDate(key){
  const [y,m,d] = key.split('-').map(Number);
  return new Date(y, m-1, d);
}
function formatDateLong(d){
  return `${GIORNI[d.getDay()]} ${d.getDate()} ${MESI[d.getMonth()]}`;
}
function periodOf(timeStr){
  const [h,m] = timeStr.split(':').map(Number);
  const mins = h*60+m;
  if(mins>=330 && mins<690) return 'mattina';      // 05:30-11:29
  if(mins>=690 && mins<870) return 'pranzo';        // 11:30-14:29
  if(mins>=870 && mins<1110) return 'pomeriggio';   // 14:30-18:29
  return 'sera';
}
const PERIOD_LABEL = {mattina:'Mattina', pranzo:'Pranzo', pomeriggio:'Pomeriggio', sera:'Sera'};
const PERIOD_COLOR_VAR = {mattina:'--mattina', pranzo:'--pranzo', pomeriggio:'--pomeriggio', sera:'--sera'};
const PERIOD_ORDER = ['mattina','pranzo','pomeriggio','sera'];

/* Giorni della settimana: indice 0=Lunedì ... 6=Domenica */
const DAY_LABELS_SHORT = ['L','M','M','G','V','S','D'];
const DAY_LABELS_LONG = ['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica'];
function weekdayIndex(date){ return (date.getDay()+6)%7; } // converte da JS (0=Dom) a 0=Lun
function defaultDays(){ return [true,true,true,true,true,true,true]; }
function medDays(med){ return (med.days && med.days.length===7) ? med.days : defaultDays(); }
function medsForDate(date){
  const wi = weekdayIndex(date);
  return medicines.filter(m=>medDays(m)[wi]);
}
function formatDays(days){
  if(!days || days.every(d=>d)) return 'Tutti i giorni';
  const weekdaysOnly = [true,true,true,true,true,false,false];
  if(days.every((d,i)=>d===weekdaysOnly[i])) return 'Lun-Ven';
  const weekendOnly = [false,false,false,false,false,true,true];
  if(days.every((d,i)=>d===weekendOnly[i])) return 'Sab-Dom';
  const active = DAY_LABELS_SHORT.filter((l,i)=>days[i]);
  if(active.length===0) return 'Nessun giorno';
  return active.join(' ');
}

/* ---------------- STORAGE ---------------- */
async function loadData(){
  try{
    const raw = localStorage.getItem('medicines');
    medicines = raw ? JSON.parse(raw) : [];
  }catch(e){ medicines = []; }
  try{
    const raw = localStorage.getItem('history');
    history = raw ? JSON.parse(raw) : {};
  }catch(e){ history = {}; }
}
async function saveMedicines(){
  try{ localStorage.setItem('medicines', JSON.stringify(medicines)); }
  catch(e){ alert('Non sono riuscito a salvare sul telefono. Riprova.'); }
}
async function saveHistory(){
  try{ localStorage.setItem('history', JSON.stringify(history)); }
  catch(e){ alert('Non sono riuscito a salvare sul telefono. Riprova.'); }
}

/* ---------------- PROMEMORIA (NOTIFICHE PUSH) ---------------- */
// Chiave pubblica VAPID: puoi lasciarla qui, è pubblica per definizione.
const VAPID_PUBLIC_KEY = 'BEzpuu5q8wFODO0BGnHZ5y9Yys87x5KI71AJB7qn8rH6zZUZ-UvrLcW27XnM3GtHjTNRF7rrktu9suPkJz-xb4I';
// Sostituisci con l'indirizzo del tuo Cloudflare Worker dopo il deploy, es:
// 'https://medicine-mamma-push.tuo-account.workers.dev'
const WORKER_URL = 'https://medicine-mamma-push.g-mennonna.workers.dev';

function notificationsSupported(){
  return ('Notification' in window) && ('serviceWorker' in navigator) && ('PushManager' in window);
}
function workerConfigured(){
  return WORKER_URL && !WORKER_URL.includes('TUO-SUBDOMAIN');
}
function urlBase64ToUint8Array(base64String){
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g,'+').replace(/_/g,'/');
  const rawData = atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for (let i=0;i<rawData.length;i++){ outputArray[i]=rawData.charCodeAt(i); }
  return outputArray;
}

async function registerServiceWorker(){
  if(!('serviceWorker' in navigator)) return null;
  try{ return await navigator.serviceWorker.register('sw.js'); }
  catch(e){ return null; }
}

async function syncToServer(subscriptionJSON){
  if(!workerConfigured()) return;
  try{
    await fetch(WORKER_URL + '/register', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ subscription: subscriptionJSON, medicines })
    });
  }catch(e){ /* offline o server non raggiungibile: si aggiornerà al prossimo avvio */ }
}

async function enablePushNotifications(){
  if(!notificationsSupported()) return false;
  const perm = await Notification.requestPermission();
  if(perm !== 'granted') return false;
  const reg = await registerServiceWorker();
  if(!reg) return false;
  let sub = await reg.pushManager.getSubscription();
  if(!sub){
    try{
      sub = await reg.pushManager.subscribe({
        userVisibleOnly:true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      });
    }catch(e){ return false; }
  }
  await syncToServer(sub.toJSON());
  return true;
}

async function maybeSyncMedicines(){
  if(!notificationsSupported() || Notification.permission!=='granted') return;
  const reg = await navigator.serviceWorker.getRegistration();
  if(!reg) return;
  const sub = await reg.pushManager.getSubscription();
  if(sub) syncToServer(sub.toJSON());
}

function updateReminderBanner(){
  const banner = document.getElementById('reminder-banner');
  const title = document.getElementById('reminder-title');
  const sub = document.getElementById('reminder-sub');
  const btn = document.getElementById('reminder-btn');

  if(!notificationsSupported()){
    banner.classList.remove('on');
    title.textContent = 'Promemoria non disponibili';
    sub.textContent = 'Questo browser non supporta le notifiche push.';
    btn.style.display = 'none';
    return;
  }
  if(location.protocol === 'file:'){
    banner.classList.remove('on');
    title.textContent = 'Promemoria non attivabili qui';
    sub.textContent = "Vanno attivati aprendo l'app dal suo indirizzo web (https), non da un file salvato sul telefono.";
    btn.style.display = 'none';
    return;
  }
  if(!workerConfigured()){
    banner.classList.remove('on');
    title.textContent = 'Promemoria da configurare';
    sub.textContent = 'Manca ancora l\'indirizzo del server. Vedi le istruzioni di attivazione.';
    btn.style.display = 'none';
    return;
  }
  const perm = Notification.permission;
  if(perm === 'granted'){
    banner.classList.add('on');
    title.textContent = 'Promemoria attivi';
    sub.textContent = 'Arrivano anche se il telefono è bloccato o l\'app è chiusa.';
    btn.style.display = 'none';
  } else if(perm === 'denied'){
    banner.classList.remove('on');
    title.textContent = 'Promemoria bloccati';
    sub.textContent = 'Il telefono ha bloccato le notifiche per questa app. Vanno riattivate dalle impostazioni del browser.';
    btn.style.display = 'none';
  } else {
    banner.classList.remove('on');
    title.textContent = 'Promemoria';
    sub.textContent = 'Ricevi un avviso quando è ora di una medicina, anche ad app chiusa.';
    btn.textContent = 'Attiva';
    btn.classList.add('off');
    btn.style.display = '';
  }
}

async function handleReminderButton(){
  await enablePushNotifications();
  updateReminderBanner();
}

/* ---------------- NAVIGATION ---------------- */
function goTo(screen){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+screen).classList.add('active');
  document.getElementById('nav-today').classList.toggle('active', screen==='today');
  document.getElementById('nav-week').classList.toggle('active', screen==='week');
  document.getElementById('nav-history').classList.toggle('active', screen==='history');
  if(screen==='today') renderToday();
  if(screen==='week') renderWeek();
  if(screen==='history') renderHistory();
  if(screen==='manage') renderManage();
  window.scrollTo(0,0);
}

/* ---------------- RENDER: OGGI ---------------- */
function renderToday(){
  const now = new Date();
  document.getElementById('today-date').textContent = formatDateLong(now);
  document.getElementById('today-sub').textContent = `Sono le ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  updateReminderBanner();

  const dayMinutes = now.getHours()*60+now.getMinutes();
  const pct = Math.min(100, Math.max(0, (dayMinutes/1440)*100));
  document.getElementById('arc-sun').style.left = pct+'%';

  const list = document.getElementById('today-list');
  list.innerHTML = '';

  if(medicines.length===0){
    list.innerHTML = `<div class="empty-box"><svg class="icon empty-icon"><use href="#icon-pill"></use></svg>Non hai ancora aggiunto medicine.<br>Tocca l'icona in alto per aggiungerne una.</div>`;
    document.getElementById('progress-row').style.display='none';
    lastToggledId = null;
    return;
  }

  const key = todayKey();
  const todayRecord = history[key] || {};
  const todaysMeds = medsForDate(now);
  let takenCount = 0;
  let cardIndex = 0;

  if(todaysMeds.length===0){
    list.innerHTML = `<div class="empty-box">Oggi non ci sono medicine in programma.</div>`;
    document.getElementById('progress-row').style.display='none';
    lastToggledId = null;
    return;
  }

  PERIOD_ORDER.forEach(period=>{
    const meds = todaysMeds.filter(m=>periodOf(m.time)===period).sort((a,b)=>a.time.localeCompare(b.time));
    if(meds.length===0) return;

    const title = document.createElement('div');
    title.className = 'period-title';
    title.innerHTML = `<span class="period-dot" style="background:var(${PERIOD_COLOR_VAR[period]})"></span>${PERIOD_LABEL[period]}`;
    list.appendChild(title);

    meds.forEach(med=>{
      const done = !!(todayRecord[med.id] && todayRecord[med.id].taken);
      if(done) takenCount++;
      const card = document.createElement('div');
      card.className = 'med-card' + (done?' done':'');
      card.style.borderLeftColor = done ? 'var(--success)' : `var(${PERIOD_COLOR_VAR[period]})`;
      card.style.animationDelay = (cardIndex*45)+'ms';
      cardIndex++;
      const justToggled = med.id === lastToggledId;
      card.innerHTML = `
        <div class="med-info">
          <p class="med-name">${escapeHtml(med.name)}</p>
          <p class="med-meta">${escapeHtml(med.dose||'')}${med.dose?' · ':''}ore ${med.time}${med.notes? ' · '+escapeHtml(med.notes):''}</p>
          ${done? `<p class="med-taken-time"><svg class="icon icon-sm"><use href="#icon-check"></use></svg>Presa alle ${todayRecord[med.id].time}</p>` : ''}
        </div>
        <button class="check-btn${justToggled?' just-toggled':''}" aria-label="${done?'Segna come non presa':'Segna come presa'}" onclick="toggleTaken('${med.id}')">${done?'<svg class="icon icon-lg"><use href="#icon-check"></use></svg>':''}</button>
      `;
      list.appendChild(card);
    });
  });

  lastToggledId = null;

  const total = todaysMeds.length;
  document.getElementById('progress-row').style.display='flex';
  document.getElementById('progress-fill').style.width = (total? (takenCount/total*100):0)+'%';
  document.getElementById('progress-label').textContent = `${takenCount} di ${total}`;
}

async function toggleTaken(medId){
  const key = todayKey();
  if(!history[key]) history[key] = {};
  const now = new Date();
  const currentlyDone = !!(history[key][medId] && history[key][medId].taken);
  if(currentlyDone){
    delete history[key][medId];
    lastToggledId = null;
  } else {
    history[key][medId] = {taken:true, time:`${pad(now.getHours())}:${pad(now.getMinutes())}`};
    lastToggledId = medId;
  }
  await saveHistory();
  renderToday();
}

/* ---------------- RENDER: STORICO ---------------- */
function renderHistory(){
  const list = document.getElementById('history-list');
  list.innerHTML = '';
  const keys = Object.keys(history).sort().reverse();

  if(keys.length===0){
    list.innerHTML = `<div class="empty-box">Non c'è ancora nessuno storico.<br>Torna qui dopo aver segnato qualche medicina come presa.</div>`;
    return;
  }

  keys.forEach((key, rowIndex)=>{
    const record = history[key] || {};
    const dayMeds = medsForDate(keyToDate(key));
    const total = dayMeds.length;
    const takenCount = dayMeds.filter(m=>record[m.id] && record[m.id].taken).length;

    let statusClass = 'status-red', summaryText = 'Nessuna presa registrata';
    if(total===0){ statusClass='status-amber'; summaryText='Nessuna medicina in programma'; }
    else if(takenCount>=total){ statusClass='status-green'; summaryText='Tutte le medicine prese'; }
    else if(takenCount>0){ statusClass='status-amber'; summaryText=`Prese ${takenCount} di ${total}`; }

    const row = document.createElement('div');
    row.className = 'day-row';
    row.style.animationDelay = (rowIndex*35)+'ms';
    const detailId = 'detail-'+key;
    row.innerHTML = `
      <div class="day-row-top" onclick="toggleDayDetail('${detailId}')">
        <span class="status-dot ${statusClass}"></span>
        <span class="day-row-date">${formatDateLong(keyToDate(key))}</span>
        <span class="day-row-summary">${summaryText}</span>
      </div>
      <div class="day-detail" id="${detailId}"></div>
    `;
    list.appendChild(row);

    const detailDiv = row.querySelector('.day-detail');
    if(dayMeds.length===0){
      detailDiv.innerHTML = '<div class="day-detail-item">Nessuna medicina in programma quel giorno.</div>';
    } else {
      dayMeds.sort((a,b)=>a.time.localeCompare(b.time)).forEach(med=>{
        const r = record[med.id];
        detailDiv.innerHTML += `<div class="day-detail-item"><span>${escapeHtml(med.name)} (ore ${med.time})</span><span>${r&&r.taken? '✓ ore '+r.time : '— non presa'}</span></div>`;
      });
    }
  });
}
function toggleDayDetail(id){
  document.getElementById(id).classList.toggle('open');
}

/* ---------------- RENDER: SETTIMANA ---------------- */
function renderWeek(){
  const list = document.getElementById('week-list');
  list.innerHTML = '';
  const todayIdx = weekdayIndex(new Date());

  if(medicines.length===0){
    list.innerHTML = `<div class="empty-box">Non hai ancora aggiunto medicine.<br>Tocca l'icona impostazioni dalla schermata Oggi per aggiungerne una.</div>`;
    return;
  }

  DAY_LABELS_LONG.forEach((label, idx)=>{
    const meds = medicines.filter(m=>medDays(m)[idx]).sort((a,b)=>a.time.localeCompare(b.time));
    const isToday = idx===todayIdx;
    const block = document.createElement('div');
    block.className = 'week-day-block' + (isToday? ' is-today':'');
    block.style.animationDelay = (idx*35)+'ms';
    let rows = meds.length===0
      ? '<div class="week-empty">Nessuna medicina</div>'
      : meds.map(m=>`<div class="week-med-row"><span>${escapeHtml(m.name)}</span><span class="wm-time">${m.time}</span></div>`).join('');
    block.innerHTML = `
      <div class="week-day-header">${label}${isToday? '<span class="today-badge">OGGI</span>':''}</div>
      ${rows}
    `;
    list.appendChild(block);
  });
}

/* ---------------- RENDER: GESTIONE ---------------- */
function renderManage(){
  resetForm();
  const list = document.getElementById('manage-list');
  list.innerHTML = '';
  if(medicines.length===0){
    list.innerHTML = `<div class="empty-box">Nessuna medicina configurata ancora. Usa il modulo qui sotto per aggiungerne una.</div>`;
    return;
  }
  medicines.slice().sort((a,b)=>a.time.localeCompare(b.time)).forEach((med, idx)=>{
    const item = document.createElement('div');
    item.className = 'manage-item';
    item.style.animationDelay = (idx*35)+'ms';
    item.innerHTML = `
      <div class="manage-item-info">
        <div class="manage-item-name">${escapeHtml(med.name)}</div>
        <div class="manage-item-meta">${escapeHtml(med.dose||'')}${med.dose?' · ':''}ore ${med.time}${med.notes? ' · '+escapeHtml(med.notes):''}</div>
        <div class="manage-item-meta">${formatDays(medDays(med))}</div>
      </div>
      <button class="small-btn" aria-label="Modifica" onclick="editMed('${med.id}')"><svg class="icon icon-sm"><use href="#icon-pencil"></use></svg></button>
      <button class="small-btn danger" aria-label="Elimina" onclick="deleteMed('${med.id}')"><svg class="icon icon-sm"><use href="#icon-trash"></use></svg></button>
    `;
    list.appendChild(item);
  });
}
let formDays = defaultDays();

function renderDayToggles(){
  const row = document.getElementById('day-toggle-row');
  row.innerHTML = '';
  DAY_LABELS_SHORT.forEach((label, idx)=>{
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'day-toggle' + (formDays[idx] ? ' active' : '');
    btn.textContent = label;
    btn.setAttribute('aria-label', DAY_LABELS_LONG[idx]);
    btn.onclick = ()=>{ formDays[idx] = !formDays[idx]; renderDayToggles(); updateQuickDayHighlight(); };
    row.appendChild(btn);
  });
}
function setQuickDays(mode){
  if(mode==='all') formDays = defaultDays();
  if(mode==='weekdays') formDays = [true,true,true,true,true,false,false];
  if(mode==='weekend') formDays = [false,false,false,false,false,true,true];
  renderDayToggles();
  updateQuickDayHighlight();
}
function updateQuickDayHighlight(){
  const buttons = document.querySelectorAll('.quick-day-btn');
  const weekdaysOnly = [true,true,true,true,true,false,false];
  const weekendOnly = [false,false,false,false,false,true,true];
  buttons[0].classList.toggle('active', formDays.every(d=>d));
  buttons[1].classList.toggle('active', formDays.every((d,i)=>d===weekdaysOnly[i]));
  buttons[2].classList.toggle('active', formDays.every((d,i)=>d===weekendOnly[i]));
}

function resetForm(){
  editingId = null;
  document.getElementById('form-title').textContent = 'Aggiungi una medicina';
  document.getElementById('save-btn').textContent = 'Salva medicina';
  document.getElementById('f-name').value = '';
  document.getElementById('f-dose').value = '';
  document.getElementById('f-time').value = '08:00';
  document.getElementById('f-notes').value = '';
  formDays = defaultDays();
  renderDayToggles();
  updateQuickDayHighlight();
}
function editMed(id){
  const med = medicines.find(m=>m.id===id);
  if(!med) return;
  editingId = id;
  document.getElementById('form-title').textContent = 'Modifica medicina';
  document.getElementById('save-btn').textContent = 'Salva modifiche';
  document.getElementById('f-name').value = med.name;
  document.getElementById('f-dose').value = med.dose||'';
  document.getElementById('f-time').value = med.time;
  document.getElementById('f-notes').value = med.notes||'';
  formDays = medDays(med).slice();
  renderDayToggles();
  updateQuickDayHighlight();
  document.getElementById('form-title').scrollIntoView({behavior:'smooth'});
}
async function deleteMed(id){
  const med = medicines.find(m=>m.id===id);
  if(!med) return;
  if(!confirm(`Eliminare "${med.name}" dall'elenco?`)) return;
  medicines = medicines.filter(m=>m.id!==id);
  await saveMedicines();
  await maybeSyncMedicines();
  renderManage();
}
async function saveMedFromForm(){
  const name = document.getElementById('f-name').value.trim();
  const dose = document.getElementById('f-dose').value.trim();
  const time = document.getElementById('f-time').value;
  const notes = document.getElementById('f-notes').value.trim();
  if(!name){ alert('Inserisci il nome della medicina.'); return; }
  if(!time){ alert('Inserisci un orario.'); return; }
  if(!formDays.some(d=>d)){ alert('Seleziona almeno un giorno della settimana.'); return; }
  const days = formDays.slice();

  if(editingId){
    const med = medicines.find(m=>m.id===editingId);
    med.name = name; med.dose = dose; med.time = time; med.notes = notes; med.days = days;
  } else {
    medicines.push({id: 'm'+Date.now(), name, dose, time, notes, days});
  }
  await saveMedicines();
  await maybeSyncMedicines();
  renderManage();
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ---------------- INIT ---------------- */
(async function init(){
  await loadData();
  renderToday();
  if(notificationsSupported() && Notification.permission === 'granted'){
    await registerServiceWorker();
    await maybeSyncMedicines();
  }
  setInterval(()=>{ if(document.getElementById('screen-today').classList.contains('active')) renderToday(); }, 60000);
})();
</script>
